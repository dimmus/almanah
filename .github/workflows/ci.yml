name: CI

on:
  push:
    branches: [ main, master, libadwaita-port ]
  pull_request:
    branches: [ main, master, libadwaita-port ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MESON_ARGS: >
        -Dbuildtype=debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build build-essential \
            gettext \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libgee-0.8-dev \
            libgtksourceview-5-dev \
            libecal2.0-dev \
            libedataserver1.2-dev \
            libspelling-1-dev \
            blueprint-compiler

      - name: Configure (Meson)
        run: |
          meson setup build ${MESON_ARGS}

      - name: Build (Ninja)
        run: |
          ninja -C build

      - name: Run tests
        run: |
          xvfb-run -s "-screen 0 1024x768x24" meson test -C build --print-errorlogs --no-suite gui

